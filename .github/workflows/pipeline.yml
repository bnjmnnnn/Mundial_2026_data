name: Mundial 2026 Pipeline

on:
  push:
    branches: [main]
  schedule:
    # Ejecutar una vez al día a las 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Permite ejecución manual desde la UI de GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Crear directorios de salida
      - name: Prepare directories
        run: mkdir -p data/raw data/silver

      # 5. Ejecutar extracción
      - name: Extract data (bronze)
        run: python -m src.extract.extract

      # 6. Ejecutar transformación
      - name: Transform data (silver)
        run: python -m src.transform.transform

      # 7. Subir capa silver como artifact descargable (siempre, incluso si hay fallo parcial)
      - name: Upload silver layer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: silver-data-${{ github.run_number }}
          path: |
            data/silver/*.csv
            data/silver/*.parquet
          retention-days: 30

      # 8. Resumen de ejecución
      - name: Summary
        if: always()
        run: |
          echo "## Mundial 2026 Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -d "data/silver" ]; then
            echo "- ✅ Silver layer generada" >> $GITHUB_STEP_SUMMARY
            echo "- Archivos: $(ls data/silver | wc -l)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Silver layer no encontrada" >> $GITHUB_STEP_SUMMARY
          fi

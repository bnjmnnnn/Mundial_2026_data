name: Mundial 2026 Pipeline

on:
  push:
    branches: [main]
    paths:
      # Solo ejecutar si cambian datos crudos o código de transformación
      - "data/raw/**"
      - "src/transform/**"
      - "src/utils/**"
  workflow_dispatch:
    # Ejecución manual desde la UI de GitHub

jobs:
  transform:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout del código (incluye datos raw si fueron pusheados)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Verificar que existan datos raw
      - name: Check raw data exists
        run: |
          if [ ! -d "data/raw/events" ] || [ -z "$(ls -A data/raw/events)" ]; then
            echo "❌ No se encontraron datos raw en data/raw/events"
            echo "Por favor ejecuta 'python -m src.extract.extract' localmente y haz push de los JSONs."
            exit 1
          fi
          echo "✅ Datos raw encontrados: $(ls data/raw/events | wc -l) eventos"

      # 5. Ejecutar transformación (silver)
      - name: Transform data (silver)
        run: python -m src.transform.transform

      # 6. Subir capa silver como artifact descargable
      - name: Upload silver layer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: silver-data-${{ github.run_number }}
          path: |
            data/silver/*.csv
            data/silver/*.parquet
          retention-days: 30

      # 7. Resumen de ejecución
      - name: Summary
        if: always()
        run: |
          echo "## Mundial 2026 Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -d "data/silver" ]; then
            echo "- ✅ Silver layer generada" >> $GITHUB_STEP_SUMMARY
            echo "- Archivos: $(ls data/silver | wc -l)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Silver layer no encontrada" >> $GITHUB_STEP_SUMMARY
          fi

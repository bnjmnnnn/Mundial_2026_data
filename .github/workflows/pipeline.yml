name: Mundial 2026 Pipeline

on:
  push:
    branches: [main]
    paths:
      # Solo ejecutar si cambian datos crudos o código de transformación
      - "data/raw/**"
      - "src/transform/**"
      - "src/validate/**"
      - "src/utils/**"
      - "requirements.txt"
  schedule:
    # Corre automáticamente cada día a las 06:00 UTC (02:00 AM ET)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Ejecución manual desde la UI de GitHub

jobs:
  # ===========================================================================
  # JOB 1: Validar datos raw (verificar que existan y sean completos)
  # ===========================================================================
  validate_raw:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      raw_count: ${{ steps.check.outputs.raw_count }}
      status: ${{ steps.check.outputs.status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check raw data exists
        id: check
        run: |
          EVENTS_DIR="data/raw/events"
          LINEUPS_DIR="data/raw/lineups"
          if [ ! -d "$EVENTS_DIR" ] || [ -z "$(ls -A $EVENTS_DIR)" ]; then
            echo "❌ No se encontraron datos raw de eventos"
            echo "status=missing" >> $GITHUB_OUTPUT
            echo "raw_count=0" >> $GITHUB_OUTPUT
            echo "lineups_count=0" >> $GITHUB_OUTPUT
            exit 1
          fi
          EVENT_COUNT=$(ls $EVENTS_DIR | wc -l)
          LINEUP_COUNT=0
          if [ -d "$LINEUPS_DIR" ]; then
            LINEUP_COUNT=$(ls $LINEUPS_DIR | wc -l)
          fi
          echo "✅ Datos raw encontrados: $EVENT_COUNT eventos, $LINEUP_COUNT lineups"
          echo "status=ok" >> $GITHUB_OUTPUT
          echo "raw_count=$EVENT_COUNT" >> $GITHUB_OUTPUT
          echo "lineups_count=$LINEUP_COUNT" >> $GITHUB_OUTPUT

      - name: Summary — Raw Validation
        if: always()
        run: |
          echo "## 📥 Validación de Datos Raw" >> $GITHUB_STEP_SUMMARY
          echo "- Eventos encontrados: ${{ steps.check.outputs.raw_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lineups encontrados: ${{ steps.check.outputs.lineups_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.check.outputs.status }}" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # JOB 2: Transformar (silver + gold)
  # ===========================================================================
  transform:
    runs-on: ubuntu-latest
    needs: validate_raw
    if: needs.validate_raw.outputs.status == 'ok'
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p data/silver data/gold data

      - name: Transform to Silver
        run: python -m src.transform.transform

      - name: Generate Gold (ML datasets)
        run: python -m src.transform.gold

      - name: Upload Silver artifact
        uses: actions/upload-artifact@v4
        with:
          name: silver-layer-${{ github.run_number }}
          path: |
            data/silver/*.csv
            data/silver/*.parquet
          retention-days: 30

      - name: Upload Gold artifact
        uses: actions/upload-artifact@v4
        with:
          name: gold-layer-${{ github.run_number }}
          path: |
            data/gold/*.csv
            data/gold/*.parquet
          retention-days: 30

      - name: Summary — Transform
        if: always()
        run: |
          echo "## 🔄 Transformación" >> $GITHUB_STEP_SUMMARY
          if [ -d "data/silver" ]; then
            echo "### Silver layer" >> $GITHUB_STEP_SUMMARY
            echo "- Archivos: $(ls data/silver | wc -l)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -d "data/gold" ]; then
            echo "### Gold layer (ML & Betting)" >> $GITHUB_STEP_SUMMARY
            echo "- Archivos: $(ls data/gold | wc -l)" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # JOB 3: Validar calidad y generar reporte
  # ===========================================================================
  validate_load:
    runs-on: ubuntu-latest
    needs: transform
    if: always() && needs.transform.result == 'success'
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Silver artifact
        uses: actions/download-artifact@v4
        with:
          name: silver-layer-${{ github.run_number }}
          path: data/silver/

      - name: Download Gold artifact
        uses: actions/download-artifact@v4
        with:
          name: gold-layer-${{ github.run_number }}
          path: data/gold/

      - name: Run Data Quality Checks
        run: python -m src.validate.quality_checks

      - name: Upload Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report-${{ github.run_number }}
          path: |
            data/quality_report.json
            data/quality_report.md
          retention-days: 30

      - name: Summary — Quality Report
        if: always()
        run: |
          echo "## ✅ Validación de Calidad" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/quality_report.md" ]; then
            cat data/quality_report.md >> $GITHUB_STEP_SUMMARY
          fi
